document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e: 17px; font-weight: 500;\">\n                  <span style=\"padding: 0 3px;\">{{ m.num }}<\u002Fspan>\n                  <span style=\"width: 100%; min-width: 13px; height: 1.5px; background: currentColor; margin: 1.5px 0;\"><\u002Fspan>\n                  <span style=\"padding: 0 3px;\">{{ m.den }}<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ m.isMixed }}\" hint-placeholder-val=\"\">\n                <span style=\"display: inline-flex; align-items: center; gap: 4px; font-size: 24px; font-weight: 500; line-height: 1;\">\n                  <span>{{ m.whole }}<\u002Fspan>\n                  <span style=\"display: inline-flex; flex-direction: column; align-items: center; line-height: 1; font-size: 17px;\">\n                    <span style=\"padding: 0 3px;\">{{ m.num }}<\u002Fspan>\n                    <span style=\"width: 100%; min-width: 13px; height: 1.5px; background: currentColor; margin: 1.5px 0;\"><\u002Fspan>\n                    <span style=\"padding: 0 3px;\">{{ m.den }}<\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div style=\"position: absolute; top: 50%; left: 85%; transform: translate(-50%, -50%); width: 2.5px; height: 20px; background: currentColor;\"><\u002Fdiv>\n          <div style=\"position: absolute; top: calc(50% + 48px); left: 85%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center;\">\n            <sc-if value=\"{{ maxIsFrac }}\" hint-placeholder-val=\"{{ true }}\">\n              <span style=\"display: inline-flex; flex-direction: column; align-items: center; line-height: 1; font-size: 17px; font-weight: 500;\">\n                <span style=\"padding: 0 3px;\">{{ maxNum }}<\u002Fspan>\n                <span style=\"width: 100%; min-width: 13px; height: 1.5px; background: currentColor; margin: 1.5px 0;\"><\u002Fspan>\n                <span style=\"padding: 0 3px;\">{{ maxDen }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ maxIsInt }}\" hint-placeholder-val=\"{{ true }}\">\n              <span style=\"font-size: 24px; font-weight: 500;\">{{ maxInt }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ showPoint }}\" hint-placeholder-val=\"\">\n            <div style=\"position: absolute; top: 50%; left: 0; right: 0; height: 46px; transform: translateY(-50%); cursor: pointer; touch-action: none; z-index: 3;\"><\u002Fdiv>\n            <div style=\"position: absolute; top: 50%; left: {{ pointLeft }}; transform: translate(-50%, -50%); width: 16px; height: 16px; border-radius: 50%; background: #e5484d; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.35); cursor: pointer; touch-action: none; z-index: 4;\"><\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n\n  <footer style=\"position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; background: {{ bg }}; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 22px 40px; border-top: 1px solid {{ border }}; font-size: 12.5px; letter-spacing: 0.04em;\">\n    <span style=\"opacity: 0.6; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;\">STEM Learning Tools<\u002Fspan>\n    <span style=\"opacity: 0.3;\">·<\u002Fspan>\n    <span style=\"opacity: 0.6;\">{{ rights }}<\u002Fspan>\n    <span style=\"opacity: 0.3;\">·<\u002Fspan>\n    <span style=\"opacity: 0.6;\">{{ by }} Abdiel Rios<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { dark: false, lang: 'en', minRaw: '0', maxRaw: '1', showMidpoints: true, fractionMarks: false, divisions: 1, showFractionValues: true, notation: 'simple', showPoint: false, pointIdx: 0 };\n\n  startDrag = (e) => {\n    if (!this.state.showPoint) return;\n    e.preventDefault();\n    this._dragging = true;\n    window.addEventListener('pointermove', this.onDrag);\n    window.addEventListener('pointerup', this.endDrag);\n    this.onDrag(e);\n  };\n  onDrag = (e) => {\n    if (!this._dragging || !this.trackEl) return;\n    const r = this.trackEl.getBoundingClientRect();\n    if (!r.width) return;\n    const pct = ((e.clientX - r.left) / r.width) * 100;\n    const snaps = this._snaps || [];\n    if (!snaps.length) return;\n    let best = 0, bd = Infinity;\n    snaps.forEach((s, i) => { const d = Math.abs(s.leftNum - pct); if (d < bd) { bd = d; best = i; } });\n    if (best !== this.state.pointIdx) this.setState({ pointIdx: best });\n  };\n  endDrag = () => {\n    this._dragging = false;\n    window.removeEventListener('pointermove', this.onDrag);\n    window.removeEventListener('pointerup', this.endDrag);\n  };\n\n  endpointDesc(p, fracEnds, N) {\n    if (p.den !== 1) return { isFrac: true, isInt: false, num: p.num, den: p.den, int: '' };\n    if (fracEnds) return { isFrac: true, isInt: false, num: p.num * N, den: N, int: '' };\n    return { isFrac: false, isInt: true, num: '', den: '', int: p.num };\n  }\n\n  pointVals(pMin, pMax, showMin, showMax, midpoints, marks, es) {\n    const desc = (p) => p.den === 1 ? { kind: 'int', whole: p.num, num: 0, den: 1 } : { kind: 'frac', whole: 0, num: p.num, den: p.den };\n    const snaps = [];\n    if (showMin) snaps.push({ leftNum: 15, ...desc(pMin) });\n    (midpoints || []).forEach((m) => snaps.push({ leftNum: parseFloat(m.left), kind: 'int', whole: m.label, num: 0, den: 1 }));\n    (marks || []).forEach((m) => snaps.push({ leftNum: parseFloat(m.left), kind: m.snapKind, whole: m.whole, num: m.num, den: m.den }));\n    if (showMax) snaps.push({ leftNum: 85, ...desc(pMax) });\n    snaps.sort((a, b) => a.leftNum - b.leftNum);\n    this._snaps = snaps;\n\n    let idx = this.state.pointIdx;\n    if (idx >= snaps.length) idx = snaps.length - 1;\n    if (idx < 0) idx = 0;\n    const sp = snaps[idx] || { leftNum: 15, kind: 'int', whole: 0, num: 0, den: 1 };\n\n    return {\n      showPoint: this.state.showPoint && snaps.length > 0,\n      onTogglePoint: (e) => this.setState({ showPoint: e.target.checked, pointIdx: 0 }),\n      setTrackRef: (el) => {\n        if (this.trackEl === el) return;\n        if (this.trackEl) this.trackEl.removeEventListener('pointerdown', this.startDrag);\n        this.trackEl = el;\n        if (el) el.addEventListener('pointerdown', this.startDrag);\n      },\n      startDrag: this.startDrag,\n      pointLeft: sp.leftNum + '%',\n      pointIsInt: sp.kind === 'int',\n      pointIsFrac: sp.kind === 'frac',\n      pointIsMixed: sp.kind === 'mixed',\n      pointWhole: sp.whole,\n      pointNum: sp.num,\n      pointDen: sp.den,\n      pointLabel: es ? 'Punto deslizante' : 'Draggable point',\n      pointBoxTitle: es ? 'Posición del punto' : 'Point position',\n    };\n  }\n\n  fractionMarkVals(pMin, pMax, showMin, showMax, es) {\n    const on = this.state.fractionMarks;\n    const N = this.state.divisions;\n    const show = this.state.showFractionValues;\n    const ready = on && showMin && showMax;\n    // Integer midpoints already label whole-number positions, so hide the\n    // fraction-mark integers when that option is active (and vice versa).\n    const midpointsActive = this.state.showMidpoints && pMin.den === 1 && pMax.den === 1;\n    let marks = [];\n    if (ready) {\n      const lo = pMin.value, hi = pMax.value, span = hi - lo;\n      const iStart = Math.ceil(lo * N - 1e-9), iEnd = Math.floor(hi * N + 1e-9);\n      if (span > 0 && iEnd - iStart <= 150) {\n        for (let i = iStart; i <= iEnd; i++) {\n          const v = i / N;\n          if (Math.abs(v - lo) < 1e-9 || Math.abs(v - hi) < 1e-9) continue;\n          if (midpointsActive && i % N === 0) continue;\n          const left = (15 + ((v - lo) / span) * 70).toFixed(4) + '%';\n          let kind, whole = 0, num = 0, den = N;\n          if (this.state.notation === 'mixed') {\n            whole = Math.floor(i / N);\n            const rem = i - whole * N;\n            if (rem === 0) kind = 'int';\n            else if (whole === 0) { kind = 'frac'; num = rem; }\n            else { kind = 'mixed'; num = rem; }\n          } else {\n            if (N === 1) { kind = 'int'; whole = i; }\n            else { kind = 'frac'; num = i; }\n          }\n          marks.push({ left, snapKind: kind, isInt: show && kind === 'int', isFrac: show && kind === 'frac', isMixed: show && kind === 'mixed', whole, num, den });\n        }\n      }\n    }\n    return {\n      fractionMarks: on,\n      marks,\n      divisions: N,\n      showFractionValues: show,\n      notaSimple: this.state.notation === 'simple',\n      notaMixed: this.state.notation === 'mixed',\n      notaDisabled: !show,\n      notaOpacity: show ? 1 : 0.4,\n      onToggleFractionMarks: (e) => this.setState({ fractionMarks: e.target.checked }),\n      onDivChange: (e) => { let n = parseInt(e.target.value, 10); if (isNaN(n)) n = 1; n = Math.max(1, Math.min(10, n)); this.setState({ divisions: n }); },\n      onToggleShowFrac: (e) => this.setState({ showFractionValues: e.target.checked }),\n      setNotaSimple: () => this.setState({ notation: 'simple' }),\n      setNotaMixed: () => this.setState({ notation: 'mixed' }),\n      fracMarksLabel: es ? 'Agregar marcas de fracciones' : 'Add fraction marks',\n      divLabel: es ? 'Divisiones por unidad' : 'Divisions per unit',\n      showFracLabel: es ? 'Mostrar los valores de las fracciones' : 'Show fraction values',\n      notaTitle: es ? 'Notación' : 'Notation',\n      notaSimpleLabel: es ? 'Fracción simple' : 'Simple fraction',\n      notaMixedLabel: es ? 'Número mixto' : 'Mixed number',\n    };\n  }\n\n  parse(str) {\n    str = (str || '').trim();\n    if (str === '') return { empty: true };\n    if (/^\\d+$/.test(str)) { const n = +str; return { num: n, den: 1, value: n }; }\n    return { invalid: true };\n  }\n\n  midpointVals(pMin, pMax, showMin, showMax, es) {\n    const bothInt = showMin && showMax && pMin.den === 1 && pMax.den === 1;\n    const midDisabled = !bothInt;\n    let midpoints = [];\n    if (bothInt && this.state.showMidpoints) {\n      const lo = pMin.value, hi = pMax.value, span = hi - lo;\n      for (let i = lo + 1; i <= hi - 1; i++) {\n        midpoints.push({ label: i, left: (15 + ((i - lo) / span) * 70).toFixed(4) + '%' });\n      }\n    }\n    return {\n      midpoints,\n      showMidpoints: this.state.showMidpoints,\n      midDisabled,\n      midOpacity: midDisabled ? 0.4 : 1,\n      onToggleMid: (e) => this.setState({ showMidpoints: e.target.checked }),\n      midLabel: es ? 'Mostrar números enteros' : 'Show whole numbers',\n    };\n  }\n\n  renderVals() {\n    const dark = this.state.dark;\n    const es = this.state.lang === 'es';\n\n    const pMin = this.parse(this.state.minRaw);\n    const pMax = this.parse(this.state.maxRaw);\n\n    let error = '';\n    const fmtBad = es ? 'Solo enteros no negativos (ej. 0, 1, 2…).' : 'Only non-negative integers (e.g. 0, 1, 2…).';\n    if (pMin.invalid || pMax.invalid) error = fmtBad;\n    else if (!pMin.empty && !pMax.empty && pMax.value <= pMin.value) {\n      error = es ? 'El segundo número debe ser mayor que el primero.' : 'The second number must be greater than the first.';\n    }\n\n    const valid = (p) => p && !p.empty && !p.invalid;\n    const showMin = valid(pMin) && !error;\n    const showMax = valid(pMax) && !error;\n\n    const midVals = this.midpointVals(pMin, pMax, showMin, showMax, es);\n    const fracVals = this.fractionMarkVals(pMin, pMax, showMin, showMax, es);\n\n    // When fraction marks are on (and integer midpoints are NOT), the integer\n    // endpoints also switch to fraction format, matching the marks' notation.\n    const midpointsActive = this.state.showMidpoints && showMin && showMax && pMin.den === 1 && pMax.den === 1;\n    const N = this.state.divisions;\n    const fracEnds = fracVals.fractionMarks && !midpointsActive && this.state.notation === 'simple' && N > 1;\n    const minD = showMin ? this.endpointDesc(pMin, fracEnds, N) : {};\n    const maxD = showMax ? this.endpointDesc(pMax, fracEnds, N) : {};\n\n    const badBorder = 'oklch(0.62 0.2 25)';\n    const okBorder = dark ? '#2e2e33' : '#d8d8dd';\n    const minBad = pMin.invalid || (error && error !== fmtBad);\n    const maxBad = pMax.invalid || (error && error !== fmtBad);\n\n    return {\n      minCaption: es ? 'Mínimo' : 'Min',\n      maxCaption: es ? 'Máximo' : 'Max',\n      minRaw: this.state.minRaw,\n      maxRaw: this.state.maxRaw,\n      onMinChange: (e) => {\n        const v = e.target.value;\n        const upd = { minRaw: v };\n        // Only bump max if the current max doesn't already satisfy max > min.\n        if (/^\\d+$/.test(v.trim())) {\n          const min = parseInt(v.trim(), 10);\n          const curMax = this.state.maxRaw.trim();\n          const maxOk = /^\\d+$/.test(curMax) && parseInt(curMax, 10) > min;\n          if (!maxOk) upd.maxRaw = String(min + 1);\n        }\n        this.setState(upd);\n      },\n      onMaxChange: (e) => this.setState({ maxRaw: e.target.value }),\n      inMinBorder: minBad ? badBorder : okBorder,\n      inMaxBorder: maxBad ? badBorder : okBorder,\n      error,\n      minIsFrac: !!minD.isFrac,\n      minIsInt: !!minD.isInt,\n      minNum: minD.num,\n      minDen: minD.den,\n      minInt: minD.int,\n      maxIsFrac: !!maxD.isFrac,\n      maxIsInt: !!maxD.isInt,\n      maxNum: maxD.num,\n      maxDen: maxD.den,\n      maxInt: maxD.int,\n      ...midVals,\n      ...fracVals,\n      ...this.pointVals(pMin, pMax, showMin, showMax, midVals.midpoints, fracVals.marks, es),\n      title: es ? 'Fracciones en la recta numérica' : 'Fractions on the number line',\n      subtitle: es ? 'Explora cómo se ubican los números en la recta numérica.' : 'Explore how numbers are placed on the number line.',\n      placeholder: es ? 'Listo para construir — dime qué sigue.' : 'Ready to build — tell me what comes next.',\n      rights: es ? `© ${new Date().getFullYear()} Todos los derechos reservados` : `© ${new Date().getFullYear()} All rights reserved`,\n      by: es ? 'por' : 'by',\n      bg: dark ? '#0d0d0f' : '#ffffff',\n      fg: dark ? '#f4f4f5' : '#18181b',\n      border: dark ? '#2e2e33' : '#d8d8dd',\n      darkLabel: dark ? (es ? 'Claro' : 'Light') : (es ? 'Oscuro' : 'Dark'),\n      langLabel: es ? 'EN' : 'ES',\n      toggleDark: () => this.setState(s => ({ dark: !s.dark })),\n      toggleLang: () => this.setState(s => ({ lang: s.lang === 'en' ? 'es' : 'en' })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
