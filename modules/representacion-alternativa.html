<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Representación alternativa · Decimales Finitos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #000;
    color: #f0f0f0;
    font-family: "Comfortaa", system-ui, sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
  }
  main {
    text-align: center;
    max-width: 520px;
  }
  .eyebrow {
    font-family: "Fira Mono", ui-monospace, monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6b7a8f;
    margin-bottom: 28px;
  }
  h1 {
    margin: 0 0 12px;
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #ffffff;
  }
  .status {
    margin: 0 0 40px;
    font-family: "Fira Mono", ui-monospace, monospace;
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #9aa7bd;
  }
  .status .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #d4a843;
    margin-right: 10px;
    vertical-align: middle;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(0.85); }
  }
  .back {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: #ffffff;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.28);
    padding: 12px 22px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    transition: background 160ms ease, border-color 160ms ease, transform 200ms ease;
  }
  .back:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.5);
    transform: translateY(-1px);
  }
  .back svg { width: 14px; height: 14px; }
</style>
</head>
<body>
  <main>
    <div class="eyebrow">Módulo 02</div>
    <h1>Representación alternativa</h1>
    <p class="status"><span class="dot"></span>En construcción</p>
    <a class="back" href="../Finite Decimals.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      <span>Volver al inicio</span>
    </a>
  </main>
</body>
</html>
